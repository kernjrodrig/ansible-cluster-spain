---
# Playbook de descubrimiento de namespaces en Kubernetes/OpenShift usando k8s_info.
# Este playbook sustituye al inventario dinámico basado en el plugin eliminado kubernetes.core.k8s.
#
# Uso típico en AAP:
# - Project: apuntar a este repositorio.
# - Inventory: uno que tenga al menos localhost (por ejemplo, el Default).
# - Credential: OpenShift/Kubernetes API (igual que la que usabas para el inventario).
# - Playbook: discover-namespaces.yml
#
# Flujo:
# 1. Este play se ejecuta en localhost y consulta la API de K8s/OCP.
# 2. Crea hosts dinámicos para cada namespace objetivo en el grupo "namespaces".
# 3. Un segundo play (en el mismo fichero o en otro) puede usar "hosts: namespaces".

- name: Descubrir namespaces en el clúster
  hosts: localhost
  gather_facts: false
  collections:
    - kubernetes.core

  vars:
    # Lista de namespaces objetivo. Si está vacía, se usarán todos los namespaces descubiertos.
    target_namespaces: []

  tasks:
    - name: Obtener lista de namespaces
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Namespace
      register: ns_info

    - name: Determinar namespaces a usar
      ansible.builtin.set_fact:
        discovered_namespaces: >-
          {{
            ns_info.resources
            | map(attribute='metadata.name')
            | list
          }}
        effective_namespaces: >-
          {{
            (target_namespaces | length > 0)
            | ternary(
                discovered_namespaces | intersect(target_namespaces),
                discovered_namespaces
              )
          }}

    - name: Depurar namespaces descubiertos y efectivos
      ansible.builtin.debug:
        msg:
          discovered_namespaces: "{{ discovered_namespaces }}"
          effective_namespaces: "{{ effective_namespaces }}"

    - name: Añadir namespaces como hosts dinámicos
      ansible.builtin.add_host:
        name: "ns_{{ item }}"
        groups: namespaces
        namespace: "{{ item }}"
      loop: "{{ effective_namespaces }}"

